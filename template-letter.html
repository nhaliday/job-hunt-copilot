<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
$for(css)$
<link rel="stylesheet" href="$css$">
$endfor$
</head>
<body>
$if(name)$
<header class="letter-header">
  <div class="letter-name">$name$</div>
  <div class="letter-contact">
    $if(email)$<a href="mailto:$email$">$email$</a>$endif$$if(phone)$ &middot; <a href="tel:$phone$">$phone$</a>$endif$$if(location)$ &middot; $location$$endif$
  </div>
</header>
$endif$
$if(date)$
<div class="letter-date">$date$</div>
$endif$
$body$
</body>
</html>
